{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center w-100">
  <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">
    <div class="card dashboard-card">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="badge rounded-pill text-bg-primary px-3 py-2 mb-2">FlexGCC Tracker</div>
          <h1 class="h4 mb-1">Sign In</h1>
          <p class="text-muted mb-0">Access your dashboard and outreach tracker.</p>
        </div>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary w-100 mt-2">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
